<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Storage — AnxOS Control Center</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="./add-storage.css">
</head>
<body class="add-storage-window">
  <main class="add-storage-shell">
    <header class="add-storage-header">
      <div>
        <p class="eyebrow">Storage Manager</p>
        <h1 data-storage-title>Add Storage</h1>
        <p>Credentials are encrypted before being written to disk.</p>
      </div>
    </header>

    <section class="add-storage-card">
      <div class="storage-provider-picker" role="tablist" aria-label="Storage provider">
        <button class="storage-provider-option is-active" type="button" data-storage-provider="local">
          <strong>Local Device</strong>
          <span>Browse files on this computer.</span>
        </button>
        <button class="storage-provider-option" type="button" data-storage-provider="sftp">
          <strong>SFTP Server</strong>
          <span>Kinetic, PebbleHost, VPS, Raspberry Pi, dedicated servers.</span>
        </button>
      </div>

      <form class="storage-form" data-storage-form>
        <div class="settings-grid">
          <label class="settings-field"><span>Connection Name</span><input type="text" data-storage-field="name" placeholder="Kinetic Survival"></label>
          <label class="settings-field"><span>Host</span><input type="text" data-storage-field="host" placeholder="sftp.kinetichosting.net"></label>
          <label class="settings-field"><span>Port</span><input type="number" min="1" max="65535" data-storage-field="port" value="22"></label>
          <label class="settings-field"><span>Username</span><input type="text" data-storage-field="username" placeholder="abc123"></label>
          <label class="settings-field"><span>Authentication</span><select data-storage-field="authType"><option value="password">Password</option><option value="privateKey">Private Key</option></select></label>
          <label class="settings-field"><span>Root Directory</span><input type="text" data-storage-field="rootDirectory" placeholder="/home/container"></label>
          <label class="settings-field" data-storage-secret="password"><span>Password</span><input type="password" data-storage-field="password" autocomplete="new-password" placeholder="Stored securely"></label>
          <label class="settings-field settings-field--wide" data-storage-secret="privateKey" hidden><span>Private Key</span><textarea data-storage-field="privateKey" placeholder="Paste private key"></textarea></label>
          <label class="settings-field" data-storage-secret="passphrase" hidden><span>Passphrase</span><input type="password" data-storage-field="passphrase" autocomplete="new-password" placeholder="Optional"></label>
        </div>

        <div class="add-storage-actions">
          <button class="inline-action" type="button" data-storage-action="cancel">Cancel</button>
          <button class="inline-action" type="button" data-storage-action="test">Test Connection</button>
          <button class="inline-action inline-action--primary" type="submit">Save Storage</button>
        </div>
        <p class="settings-inline-status" data-storage-message>Credentials are encrypted before being written to disk.</p>
      </form>
    </section>
  </main>

  <script src="./add-storage.js"></script>
</body>
</html>
