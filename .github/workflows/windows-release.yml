name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Report Windows signing mode
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          if ($env:CSC_LINK -or $env:WIN_CSC_LINK) {
            "Windows code-signing secret is present. electron-builder will sign Windows artifacts."
          } else {
            "No Windows code-signing secret is configured. Windows artifacts will build unsigned and are dev-only until Anx provides a trusted certificate."
          }

      - name: Build Windows installer
        run: npm run dist:win -- --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anxos-control-center-windows
          path: |
            dist/AnxOS-Control-Center-Setup-*.exe
            dist/AnxOS-Control-Center-*-portable.exe
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        run: npm run dist:linux -- --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anxos-control-center-linux
          path: |
            dist/AnxOS-Control-Center-*.deb
            dist/AnxOS-Control-Center-*.AppImage
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - windows
      - linux
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksum manifest
        shell: bash
        run: |
          cd release-artifacts
          sha256sum AnxOS-Control-Center-* > SHA256SUMS

      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ secrets.ANXOS_RELEASE_REPO_TOKEN }}
          ANXOS_RELEASE_REPOSITORY: bungopam-byte/AnxOS-Control-Center-Releases
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ANXOS_RELEASE_REPO_TOKEN is required to publish public release assets." >&2
            exit 1
          fi
          if gh release view "${{ github.ref_name }}" --repo "$ANXOS_RELEASE_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "${{ github.ref_name }}" \
              --repo "$ANXOS_RELEASE_REPOSITORY" \
              --title "${{ github.ref_name }}" \
              --notes "Desktop installers and portable builds for AnxOS Control Center ${{ github.ref_name }}."
            gh release upload "${{ github.ref_name }}" release-artifacts/* \
              --repo "$ANXOS_RELEASE_REPOSITORY" \
              --clobber
          else
            gh release create "${{ github.ref_name }}" release-artifacts/* \
              --repo "$ANXOS_RELEASE_REPOSITORY" \
              --title "${{ github.ref_name }}" \
              --notes "Desktop installers and portable builds for AnxOS Control Center ${{ github.ref_name }}."
          fi
