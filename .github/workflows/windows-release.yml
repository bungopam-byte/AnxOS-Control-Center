name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anxos-control-center-windows
          path: |
            dist/AnxOS-Control-Center-Setup-*.exe
            dist/AnxOS-Control-Center-*-portable.exe
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux packages
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anxos-control-center-linux
          path: |
            dist/AnxOS-Control-Center-*.deb
            dist/AnxOS-Control-Center-*.AppImage
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - windows
      - linux
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" release-artifacts/* \
            --title "${{ github.ref_name }}" \
            --notes "Desktop installers and portable builds for AnxOS Control Center ${{ github.ref_name }}."
