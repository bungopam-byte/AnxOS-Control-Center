name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anxos-control-center-windows
          path: |
            dist/AnxOS-Control-Center-Setup-*.exe
            dist/AnxOS-Control-Center-*-portable.exe
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag `
            dist/AnxOS-Control-Center-Setup-*.exe `
            dist/AnxOS-Control-Center-*-portable.exe `
            --title $tag `
            --notes "Windows installer and portable build for AnxOS Control Center $tag."
