<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AnxOS | Password Recovery</title>
    <meta name="description" content="Request a password reset for your AnxOS account.">
    <link rel="icon" type="image/jpeg" href="assets/anxos-logo.jpg">
    <link rel="stylesheet" href="styles.css">
    <script src="config.js" defer></script>
    <script src="account-config.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="site.js" defer></script>
  </head>
  <body data-standalone-route="forgot-password">
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="AnxOS home">
        <span class="brand-mark"><img data-logo src="assets/anxos-logo.jpg" alt=""></span>
        <span class="brand-copy"><strong data-config="brandName">AnxOS</strong><span>Account Recovery</span></span>
      </a>
      <button class="site-menu-button" type="button" data-site-menu-toggle aria-expanded="false" aria-controls="site-nav">Menu</button>
      <nav class="site-nav" id="site-nav" data-site-nav aria-label="Primary">
        <a href="index.html#signin">Sign In</a>
        <a href="index.html#signup">Sign Up</a>
        <a href="release-notes.html">Release Notes</a>
      </nav>
    </header>
    <main id="forgot-password">
      <section class="section-shell account-route account-route--active" data-account-route="forgot-password">
        <div class="auth-shell auth-shell--single">
          <div class="auth-card">
            <div class="auth-card__header">
              <p class="eyebrow">Account Recovery</p>
              <h2>Reset your password</h2>
              <p>Enter your AnxOS account email and we will send a secure reset link.</p>
            </div>
            <form class="account-form auth-form" data-auth-form="forgot">
              <label>Email<input type="email" name="email" autocomplete="email" required></label>
              <button class="button button-primary auth-primary" type="submit">Send Reset Link</button>
              <p class="form-message" role="status" data-auth-message="forgot"></p>
            </form>
            <div class="auth-form__footer"><a href="index.html#signin">Back to sign in</a></div>
          </div>
        </div>
      </section>
    </main>
    <footer class="site-footer"><span>AnxOS</span><a href="index.html#account">Account</a><a data-config-href="repositoryUrl" href="#">GitHub</a></footer>
  </body>
</html>
