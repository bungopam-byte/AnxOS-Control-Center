services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      CONFIG_DIR: /app/config
    restart: unless-stopped
    volumes:
      - discord-bot-data:/app/data
      - discord-bot-logs:/app/logs
      - discord-bot-config:/app/config

volumes:
  discord-bot-data:
  discord-bot-logs:
  discord-bot-config:
