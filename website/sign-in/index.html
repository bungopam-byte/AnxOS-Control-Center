<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" content="#07020f">
    <link rel="canonical" href="https://anxoscontrolcenter.org/signin">
    <link rel="stylesheet" href="/styles.css">
    <title>AnxOS Sign In</title>
    <script>
      const query = window.location.search || "";
      window.location.replace("/signin" + query);
    </script>
  </head>
  <body>
    <main class="section-shell account-route account-route--active">
      <div class="auth-shell auth-shell--single">
        <section class="auth-card">
          <div class="auth-card__header">
            <p class="eyebrow">Account</p>
            <h2>Continue to sign in</h2>
            <p>This page redirects to the current AnxOS sign-in route.</p>
          </div>
          <a class="button button-primary" href="/signin">Continue to sign in</a>
        </section>
      </div>
    </main>
  </body>
</html>
